name: Continuous Deployment Backend
on:
    push: 
        branches: [main]
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the code
              uses: actions/checkout@v3

            - name: Docker login
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            
            - name: Build and push
              uses: docker/build-push-action@v4
              with:
                context: .
                file: ./docker/Dockerfile.backend
                push: true
                tags: sab2/user-app-backend:${{ github.sha }}

            - name: Deploy to VM
              run: |
                echo "${{ secrets.SSH_PRIVATE_KEY }}" &> /home/runner/ssh_key
                chmod 700 /home/runner/ssh_key 
                ssh -o StrictHostKeyChecking=no -i /home/runner/ssh_key ubuntu@98.82.118.24 -t "docker rm -f user_backend || true && docker run --name user_backend -e DATABASE_URL='${{ secrets.DATABASE_URL }}' -d -p 8080:8080 sab2/user-app-backend:${{ github.sha }}"